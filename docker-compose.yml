services:
  running-coach:
    build: .
    ports:
      - "${PORT:-4218}:4218"
    env_file:
      - .env
    volumes:
      # Persist logged workouts outside the container
      - ./workouts.json:/app/workouts.json
      # Read-only access to Statistics for Strava DB for best effort PRs (optional)
      - /home/riley-griffith/mediastack/config/strava/database/strava.db:/data/strava.db:ro
    restart: unless-stopped
