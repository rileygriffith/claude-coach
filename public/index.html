<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Running Coach</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">

    <header>
      <div class="header-left">
        <img src="icon.png" alt="Running Coach" class="header-icon" />
        <div>
          <div class="logo">Running Coach</div>
          <div class="subtitle">AI-powered training recommendations</div>
        </div>
      </div>
      <div class="header-right">
        <div class="unit-toggle">
          <button id="unit-km" class="unit-btn">km</button>
          <button id="unit-mi" class="unit-btn active">mi</button>
        </div>
        <button id="settings-btn" class="settings-btn" title="Settings">⚙</button>
      </div>
    </header>

    <!-- Settings panel -->
    <section id="settings-panel" class="section settings-panel" hidden>
      <h2 class="section-label">Settings</h2>

      <div class="settings-field">
        <label for="goal-input">Training Goal</label>
        <textarea id="goal-input" class="goal-input" rows="2" placeholder="e.g. Run a sub-2hr half marathon by June…"></textarea>
      </div>
    </section>

    <!-- Generate button -->
    <section class="section generate-section">
      <button id="generate-btn" class="generate-btn" disabled>
        <span id="btn-text"></span>
        <span id="btn-loading" hidden>Analyzing your training…</span>
      </button>
      <div class="prompt-preview-wrap">
        <button id="prompt-preview-btn" class="prompt-preview-toggle">▶ Preview prompt</button>
        <pre id="prompt-preview" class="prompt-preview" hidden></pre>
      </div>
    </section>

    <!-- Workout options -->
    <section id="workouts-section" class="section" hidden>
      <div class="workouts-header">
        <h2 class="section-label">Today's Options</h2>
        <span id="cost-display" class="cost-display" hidden></span>
      </div>
      <div id="workouts-grid" class="workouts-grid"></div>
    </section>

    <!-- Recent runs -->
    <section class="section">
      <h2 class="section-label">Recent Runs</h2>
      <div id="runs-grid" class="runs-grid">
        <div class="state-msg">Loading your runs…</div>
      </div>
    </section>

    <!-- Calendar -->
    <section class="section">
      <h2 class="section-label">Training Calendar</h2>
      <div id="calendar" class="calendar">
        <div class="state-msg">Loading…</div>
      </div>
    </section>

  </div>

  <script src="app.js"></script>
</body>
</html>
